<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Settlement</title>
<link rel="stylesheet" href="/shared/ledger.css">
<link rel="stylesheet" href="/shared/paper.css">
<style>
  /* The table screen: one thing at a time, held up to the light.
     Projected in front of everyone — no chrome, no controls. */
  html, body { height: 100%; background: #17120c; }
  body {
    color: #e8dfcc;
    overflow: hidden;
    cursor: none;
  }
  #stage {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.2rem;
    padding: 3vh 4vw;
    text-align: center;
    animation: appear 0.9s ease both;
  }
  @keyframes appear {
    from { opacity: 0; transform: scale(0.985); }
    to { opacity: 1; transform: none; }
  }
  .smallcaps { color: #a89877; }

  /* idle */
  .idle-name { font-size: clamp(2.2rem, 6vw, 4.5rem); letter-spacing: 0.03em; }
  .idle-season { font-size: clamp(1rem, 2.2vw, 1.5rem); }

  /* image */
  #stage.image { padding: 0; gap: 0; position: relative; }
  #stage.image img {
    max-width: 100vw; max-height: 100vh;
    object-fit: contain;
  }
  #stage.image .caption {
    position: absolute; bottom: 3.5vh; left: 0; right: 0;
    font-variant: small-caps; letter-spacing: 0.12em;
    color: #e8dfcc; font-size: clamp(1rem, 2vw, 1.4rem);
    text-shadow: 0 1px 8px rgba(0, 0, 0, 0.9), 0 0 2px rgba(0, 0, 0, 0.9);
  }

  /* card (folk / person / place) */
  .card-portrait {
    width: clamp(160px, 24vh, 280px); height: clamp(160px, 24vh, 280px);
    border-radius: 50%; overflow: hidden;
    background: #2b2318; border: 2px solid #6b5c42;
    display: flex; align-items: center; justify-content: center;
    font-size: 4rem; color: #c9ba97;
    box-shadow: 0 10px 50px rgba(0, 0, 0, 0.6);
  }
  .card-portrait.wide { border-radius: 14px; width: clamp(280px, 52vw, 720px); height: clamp(180px, 38vh, 420px); }
  .card-portrait img { width: 100%; height: 100%; object-fit: cover; }
  .card-name { font-size: clamp(2rem, 5vw, 3.6rem); letter-spacing: 0.02em; }
  .card-sub { font-variant: small-caps; letter-spacing: 0.1em; font-size: clamp(1rem, 2vw, 1.4rem); color: #a89877; }
  .card-desc { max-width: 760px; font-size: clamp(1.05rem, 2.2vw, 1.5rem); line-height: 1.55; }
  .pill { border: 1px solid #6b5c42; color: #c9ba97; border-radius: 999px; padding: 0.15em 0.9em; font-variant: small-caps; }

  /* stores */
  .stores-strip { display: flex; gap: clamp(1.5rem, 5vw, 4rem); flex-wrap: wrap; justify-content: center; }
  .stores-strip .stat .value { font-size: clamp(2.5rem, 7vw, 5rem); font-weight: 600; color: #f0e6ce; }
  .stores-strip .stat .smallcaps { font-size: clamp(0.9rem, 1.8vw, 1.2rem); }

  /* buildings */
  .b-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.2rem; width: min(1100px, 92vw); }
  .b-card {
    background: #221b12; border: 1px solid #453824; border-radius: 10px;
    padding: 1.1rem 1.3rem; text-align: left;
  }
  .b-card strong { font-size: 1.25rem; }
  .b-card .muted { color: #a89877; font-size: 0.95rem; }

  /* text */
  .text-title { font-size: clamp(1.8rem, 4.5vw, 3.2rem); }
  .text-body { max-width: 820px; font-size: clamp(1.1rem, 2.4vw, 1.7rem); line-height: 1.6; white-space: pre-wrap; }

  /* paper */
  #stage.paper { display: grid; place-items: center; padding: 2vh 3vw; }
  #stage.paper .paper-sheet { width: min(820px, 92vw); min-height: min(760px, 94vh); max-height: 96vh; overflow-x: hidden; overflow-y: auto; text-align: left; }

  .divider {
    border: 0; height: 1px; width: min(360px, 50vw);
    background: linear-gradient(90deg, transparent, #6b5c42, transparent);
  }
</style>
</head>
<body>
<div id="stage"></div>
<script type="module" src="screen.js"></script>
</body>
</html>
