<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Drafting Board — The Settlement</title>
<link rel="stylesheet" href="/shared/ledger.css">
<link rel="stylesheet" href="/shared/gm-tools.css">
<style>
  html, body { height: 100%; overflow: hidden; }

  #viewport {
    position: fixed; inset: 0;
    background-color: var(--paper);
    background-image: radial-gradient(circle, var(--rule) 1px, transparent 1.5px);
    cursor: grab;
    touch-action: none;
  }
  #viewport.panning { cursor: grabbing; }
  #world { position: absolute; top: 0; left: 0; transform-origin: 0 0; }

  /* toolbar */
  #bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap;
    padding: 0.5rem 0.8rem;
    background: color-mix(in srgb, var(--paper-inset) 92%, transparent);
    border-bottom: 1px solid var(--rule-strong);
    backdrop-filter: blur(3px);
  }
  #bar .title { font-weight: 600; margin-right: 0.6rem; }
  #bar button { padding: 0.3rem 0.8rem; font-size: 0.85rem; }
  #bar .sep { width: 1px; height: 22px; background: var(--rule-strong); margin: 0 0.4rem; }
  .board-switch { display: inline-flex; border: 1px solid var(--rule-strong); border-radius: 3px; overflow: hidden; }
  #bar .board-switch button { border: 0; border-radius: 0; color: var(--ink-soft); background: var(--paper-raised); }
  #bar .board-switch button + button { border-left: 1px solid var(--rule-strong); }
  #bar .board-switch button[aria-pressed="true"] { color: var(--paper-raised); background: var(--oxblood); }
  #pins { display: flex; gap: 0.35rem; flex-wrap: wrap; align-items: center; }
  .pin-chip {
    display: inline-flex; align-items: center; gap: 0.35rem;
    font-size: 0.82rem; padding: 0.2rem 0.6rem;
    background: var(--paper-raised); border: 1px solid var(--rule-strong); border-radius: 12px;
    cursor: pointer;
  }
  .pin-chip:hover { border-color: var(--oxblood); }
  .pin-chip .x { color: var(--ink-faint); cursor: pointer; padding: 0 0.1rem; }
  .pin-chip .x:hover { color: var(--grave); }

  /* plates */
  .plate {
    position: absolute;
    background: var(--paper-raised);
    border: 1px solid var(--rule-strong);
    border-radius: 5px;
    box-shadow: 0 2px 8px rgba(46, 40, 32, 0.14);
    display: flex; flex-direction: column;
  }
  .plate-head {
    display: flex; align-items: center; justify-content: space-between; gap: 0.5rem;
    padding: 0.35rem 0.6rem;
    background: var(--paper-inset);
    border-bottom: 1px solid var(--rule);
    border-radius: 5px 5px 0 0;
    cursor: grab;
    font-variant: small-caps; letter-spacing: 0.05em; font-size: 0.82rem; color: var(--ink-soft);
    user-select: none;
  }
  .plate-head .x { cursor: pointer; color: var(--ink-faint); font-size: 1rem; line-height: 1; }
  .plate-head .x:hover { color: var(--grave); }
  .plate-body { padding: 0.6rem 0.8rem; font-size: 0.9rem; }

  .plate input[type=text], .plate textarea, .plate select {
    width: 100%; border: none; background: transparent; padding: 0.15rem 0;
  }
  .plate input[type=text]:focus, .plate textarea:focus { outline: none; }
  .plate textarea { min-height: 90px; font-size: 0.88rem; line-height: 1.45; }
  .note-title { font-weight: 600; font-size: 0.95rem; }

  .counter-row { display: flex; align-items: center; justify-content: center; gap: 0.7rem; padding: 0.3rem 0; }
  .counter-val { font-size: 2.4rem; font-weight: 600; min-width: 2ch; text-align: center; }
  .counter-row button { font-size: 1.1rem; padding: 0.15rem 0.7rem; }

  .statline { display: flex; gap: 0.9rem; flex-wrap: wrap; margin: 0.3rem 0; }
  .statline .s { text-align: center; }
  .statline .s b { display: block; font-size: 1.15rem; }
  .statline .s span { font-size: 0.7rem; font-variant: small-caps; color: var(--ink-faint); }
  .chips { display: flex; flex-wrap: wrap; gap: 0.25rem; margin-top: 0.3rem; }
  .chips .pill { font-size: 0.72rem; padding: 0 0.45rem; }
  .viterow { display: flex; align-items: center; gap: 0.4rem; margin: 0.15rem 0; }
  .viterow .lbl { font-size: 0.72rem; font-variant: small-caps; color: var(--ink-faint); min-width: 52px; }
  .dot { display: inline-block; width: 11px; height: 11px; border-radius: 3px; border: 1px solid var(--rule-strong); margin-right: 2px; }
  .dot.on { background: var(--gold); border-color: var(--gold); }
  .dot.on.harm { background: var(--oxblood); border-color: var(--oxblood); }
  .dot.round { border-radius: 50%; }
  .quiet-line { color: var(--ink-faint); font-size: 0.78rem; margin-top: 0.4rem; }
  .stores-row { display: flex; justify-content: space-between; padding: 0.12rem 0; border-bottom: 1px solid var(--rule); }
  .stores-row:last-child { border-bottom: none; }

  #empty-hint {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    color: var(--ink-faint); font-style: italic; pointer-events: none;
  }
  #empty-hint[hidden] { display: none; }
  @media (max-width: 700px) {
    #bar {
      flex-wrap: nowrap;
      overflow-x: auto;
      overscroll-behavior-x: contain;
      scrollbar-width: thin;
    }
    #bar > * { flex: none; }
    #bar .title,
    #bar a,
    #pins { white-space: nowrap; }
    #pins { flex-wrap: nowrap; }
    #bar > span[style] { display: none; }
  }
</style>
</head>
<body>
<div id="viewport"><div id="world"></div></div>
<div id="empty-hint" hidden>The board is blank. Add a note, or double-click anywhere.</div>
<div id="bar">
  <span class="title" id="board-title">The Drafting Board</span>
  <div class="board-switch" role="group" aria-label="Board">
    <button type="button" data-board-select="main" aria-pressed="true">Main</button>
    <button type="button" data-board-select="hud" aria-pressed="false">HUD</button>
  </div>
  <span class="sep"></span>
  <button class="quiet" data-add="note">+ Note</button>
  <button class="quiet" data-add="counter">+ Counter</button>
  <button class="quiet" data-add="character">+ Character</button>
  <button class="quiet" data-add="folk">+ Folk</button>
  <button class="quiet" data-add="stores">+ Stores</button>
  <button class="quiet" data-add="card">+ Card</button>
  <button class="quiet" data-add="term">+ Term</button>
  <span class="sep"></span>
  <button id="pin-add">Pin this view</button>
  <div id="pins"></div>
  <span style="flex:1"></span>
        <a href="/gm" style="font-size:0.82rem;">← GM console</a>
</div>
<div id="gm-tools-root"></div>
<script type="module" src="board.js"></script>
<script type="module" src="/shared/gm-tools.js"></script>
</body>
</html>
