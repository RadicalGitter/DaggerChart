<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Settlement — Tome</title>
<link rel="stylesheet" href="/shared/ledger.css">
<link rel="stylesheet" href="tome.css">
</head>
<body>
  <!-- Shared SVG filters: the grain, fray and mottling that age everything. -->
  <svg width="0" height="0" aria-hidden="true" style="position:absolute">
    <defs>
      <filter id="fray" x="-6%" y="-6%" width="112%" height="112%">
        <feTurbulence type="fractalNoise" baseFrequency="0.032 0.09" numOctaves="4" seed="7" result="n"/>
        <feDisplacementMap in="SourceGraphic" in2="n" scale="9" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
      <filter id="fray-soft" x="-4%" y="-4%" width="108%" height="108%">
        <feTurbulence type="fractalNoise" baseFrequency="0.05 0.12" numOctaves="3" seed="3" result="n"/>
        <feDisplacementMap in="SourceGraphic" in2="n" scale="5" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
  </svg>

  <div class="candle-glow" aria-hidden="true"></div>
  <div class="dust" id="dust" aria-hidden="true"></div>

  <header class="folio-head">
    <div class="folio-season" id="folio-season">—</div>
    <div class="folio-stores" id="folio-stores"></div>
  </header>

  <main class="tome-viewport" id="tome-viewport">
    <div class="tome-scale" id="tome-scale">
      <div class="tome" id="tome" data-state="closed">
        <div class="tome-shadow" aria-hidden="true"></div>

        <div class="back-board" aria-hidden="true"></div>
        <div class="page-block" aria-hidden="true"></div>

        <section class="paper paper-left" aria-label="Left page">
          <div class="paper-skin" aria-hidden="true"></div>
          <button class="close-tome" id="close-tome" type="button" data-i18n="table.book.close">Close the book</button>
          <div class="paper-scroll" id="left-content"></div>
          <span class="page-number" id="left-number"></span>
        </section>

        <section class="paper paper-right" aria-label="Right page">
          <div class="paper-skin" aria-hidden="true"></div>
          <div class="paper-scroll" id="right-content"></div>
          <span class="page-number" id="right-number"></span>
        </section>

        <button class="front-cover" id="front-cover" type="button" aria-label="Open the book">
          <span class="cover-face cover-front">
            <span class="cover-wear" aria-hidden="true"></span>
            <span class="cover-scuffs" aria-hidden="true"></span>
            <span class="cover-title" id="cover-title">The Settlement</span>
            <span class="cover-rule" aria-hidden="true"></span>
            <span class="cover-subtitle" data-i18n="table.book.subtitle">A ledger kept by lamplight</span>
            <span class="cover-season" id="cover-season">—</span>
            <span class="cover-hint" data-i18n="table.book.choose">Choose a bookmark</span>
          </span>
          <span class="cover-face cover-inside" aria-hidden="true">
            <span class="pastedown"></span>
          </span>
        </button>

        <div class="turn-sheet" id="turn-sheet" hidden aria-hidden="true">
          <span class="turn-face turn-front"></span>
          <span class="turn-face turn-back"></span>
        </div>

        <nav class="keepsakes" id="keepsakes" aria-label="Book chapters"></nav>
      </div>
    </div>
  </main>

  <p class="tome-instruction" id="tome-instruction" data-i18n="table.book.choose">Choose a bookmark</p>
  <a class="steward-door" href="/gm" aria-label="ledger">&#10087;</a>

  <script type="module" src="tome.js"></script>
</body>
</html>
