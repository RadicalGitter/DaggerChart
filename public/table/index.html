<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Settlement</title>
<link rel="stylesheet" href="/shared/ledger.css">
<link rel="stylesheet" href="/shared/lamplight.css">
<style>
  /* The table view: lamplight over dark wood. Projection-friendly. */
  body {
    background: #211b14;
    color: #e8dfcc;
    font-size: 18px;
  }
  .wrap { max-width: 1200px; margin: 0 auto; padding: 2.5rem 2rem; }
  header { text-align: center; margin-bottom: 2rem; }
  header h1 { font-size: 2.2rem; letter-spacing: 0.02em; }
  /* The masthead is the way home: press the town's name anywhere to return
     to the card row (same idea as a site banner). */
  #t-name { cursor: pointer; transition: color 0.2s; }
  #t-name:hover { color: #d4b86a; }
  header .smallcaps { color: #a89877; font-size: 1rem; }
  .divider {
    border: 0; height: 1px; margin: 2rem auto; width: 60%;
    background: linear-gradient(90deg, transparent, #6b5c42, transparent);
  }
  .stat-strip { display: flex; justify-content: center; gap: 2.5rem; flex-wrap: wrap; }
  .stat { text-align: center; }
  .stat .value { font-size: 2.2rem; font-weight: 600; color: #f0e6ce; }
  .stat .smallcaps { color: #a89877; }

  /* --- the deck: big section cards, or a docked stack + open panel --- */
  .deck-area { display: flex; align-items: flex-start; gap: 1.6rem; }
  .deck { position: relative; flex: 1 1 auto; }
  .deck-area.docked .deck { flex: 0 0 auto; }

  .big-card {
    position: absolute; left: 0; top: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 0.7rem; padding: 1rem;
    background: #2b2318; border: 1px solid #453824; border-radius: 12px;
    color: inherit; font: inherit; cursor: pointer;
    box-shadow: 0 4px 18px rgba(0, 0, 0, 0.35);
    transition: transform 0.45s cubic-bezier(0.22, 0.9, 0.3, 1),
                width 0.45s cubic-bezier(0.22, 0.9, 0.3, 1),
                height 0.45s cubic-bezier(0.22, 0.9, 0.3, 1),
                border-color 0.2s;
    overflow: hidden;
  }
  .deck.no-anim .big-card { transition: none; }
  .big-card:hover { border-color: #8a7550; background: #2b2318; }
  .big-card.on-top { border-color: #d4b86a; }
  .bc-title { font-size: 1.05rem; color: #c9ba97; letter-spacing: 0.06em; }
  .bc-count { font-size: 3.2rem; font-weight: 600; color: #f0e6ce; line-height: 1; transition: opacity 0.25s; }
  .bc-rule { width: 42px; height: 1px; background: linear-gradient(90deg, transparent, #6b5c42, transparent); transition: opacity 0.25s; }
  .docked .bc-count, .docked .bc-rule { opacity: 0; }

  .panel { flex: 1 1 auto; min-width: 0; animation: panel-in 0.4s ease 0.18s both; }
  .panel[hidden] { display: none; }
  .bc-sub { font-size: 0.85rem; color: #a89877; }

  /* Journal / sheet / creator live inside the panel, same origin, no chrome. */
  .panel iframe {
    width: 100%; height: calc(100vh - 150px); min-height: 420px;
    border: 0; border-radius: 12px; background: transparent;
  }

  /* the character picker */
  .who { max-width: 420px; margin: 0 auto; display: flex; flex-direction: column; gap: 0.7rem; }
  .who button { font-size: 1.05rem; padding: 0.8rem; }
  .who .cross { margin-top: 0.6rem; }
  .switch-pc {
    display: inline-block; margin-bottom: 0.5rem; color: #a89877; font-size: 0.8rem;
    text-decoration: none; border-bottom: 1px dotted #6b5c42; cursor: pointer;
  }

  /* Narrow screens (players' phones): the row becomes a column of banners,
     the docked stack sits above the panel instead of beside it. */
  .deck.banners .big-card { flex-direction: row; justify-content: flex-start; gap: 0.9rem; padding: 0 1.1rem; }
  .deck.banners .bc-rule { display: none; }
  .deck.banners .bc-count { font-size: 1.6rem; }
  .deck-area.stacked { flex-direction: column; }
  @keyframes panel-in {
    from { opacity: 0; transform: translateX(14px); }
    to { opacity: 1; transform: none; }
  }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 1rem; }
  .card {
    background: #2b2318; border: 1px solid #453824; box-shadow: none; color: inherit;
  }
  .card .muted { color: #a89877; }
  .pill { border-color: #6b5c42; color: #c9ba97; }
  .portrait {
    width: 64px; height: 64px; border-radius: 50%;
    background: #3a2f1e; border: 1px solid #6b5c42;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 1.5rem; color: #c9ba97; flex: none; overflow: hidden;
  }
  .portrait img { width: 100%; height: 100%; object-fit: cover; }
  .folk-head { display: flex; gap: 0.9rem; align-items: center; }
  .traits { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.5rem; }
  .chronicle { max-width: 720px; margin: 0 auto; }
  .chronicle .entry { padding: 0.8rem 0; border-bottom: 1px solid #3a2f1e; }
  .chronicle .season { color: #a89877; font-variant: small-caps; font-size: 0.9rem; }
  .empty { text-align: center; color: #a89877; font-style: italic; }

  /* The steward's door back to the console. Deliberately quiet — this screen
     is projected for the table. */
  .steward-door {
    position: fixed; right: 0.8rem; bottom: 0.6rem; z-index: 98;
    color: #6b5c42; opacity: 0.35; font-size: 1.15rem;
    text-decoration: none; transition: opacity 0.2s;
  }
  .steward-door:hover { opacity: 0.85; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1 id="t-name" role="button" tabindex="0" title="">The Settlement</h1>
    <div class="smallcaps" id="t-season">—</div>
  </header>

  <div class="stat-strip" id="t-stats"></div>

  <hr class="divider">

  <div class="deck-area" id="deck-area">
    <div class="deck no-anim" id="deck">
      <button class="big-card" data-card="town">
        <div class="bc-title smallcaps" data-i18n="table.town">The Town</div>
        <div class="bc-rule"></div>
        <div class="bc-count" id="count-town">—</div>
      </button>
      <button class="big-card" data-card="folk">
        <div class="bc-title smallcaps" data-i18n="table.folk">Folk of Note</div>
        <div class="bc-rule"></div>
        <div class="bc-count" id="count-folk">—</div>
      </button>
      <button class="big-card" data-card="chronicle">
        <div class="bc-title smallcaps" data-i18n="table.chronicle">The Chronicle</div>
        <div class="bc-rule"></div>
        <div class="bc-count" id="count-chronicle">—</div>
      </button>
      <button class="big-card" data-card="journal">
        <div class="bc-title smallcaps" data-i18n="journal.title">The Journal</div>
        <div class="bc-rule"></div>
        <div class="bc-count" id="count-journal">✎</div>
      </button>
      <button class="big-card" data-card="character">
        <div class="bc-title smallcaps" data-i18n="table.character">Your Character</div>
        <div class="bc-rule"></div>
        <div class="bc-count" id="count-character">?</div>
        <div class="bc-sub smallcaps" id="sub-character"></div>
      </button>
    </div>
    <section class="panel" id="panel" hidden>
      <div id="panel-body"></div>
    </section>
  </div>
</div>
<a class="steward-door" href="/gm" aria-label="ledger">&#10087;</a>
<script type="module" src="table.js"></script>
</body>
</html>
