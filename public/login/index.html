<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#211b14">
<link rel="apple-touch-icon" href="/pwa/apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="stylesheet" href="/shared/native-feel.css">
<script type="module" src="/shared/pwa.js"></script>
<title>Choose your place at the table</title>
<link rel="stylesheet" href="/shared/ledger.css">
<link rel="stylesheet" href="/shared/lamplight.css">
<link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="room-grain" aria-hidden="true"></div>
  <main class="login-shell">
    <header class="login-head">
      <div class="login-language-slot" id="lang-toggle-slot"></div>
      <h1 data-i18n="login.title">Choose your place at the table</h1>
      <p class="login-sub" data-i18n="login.subtitle">Choose a finished character or return to a draft</p>
    </header>

    <section class="identity-stack">
      <div class="character-view-window" id="character-views" data-view="finished">
        <section class="character-view finished-view">
          <div class="players-heading">
            <span data-i18n="login.finished">Finished characters</span>
            <span class="heading-rule" aria-hidden="true"></span>
          </div>
          <div class="campaign-groups" id="finished-characters"></div>
        </section>
        <section class="character-view drafts-view" id="unfinished-section" inert>
          <div class="players-heading">
            <span data-i18n="login.unfinished">Unfinished characters</span>
            <span class="heading-rule" aria-hidden="true"></span>
          </div>
          <div class="campaign-groups" id="unfinished-characters"></div>
        </section>
      </div>
      <div class="character-tools">
        <a class="create-character-command" href="/create/?new=1" data-i18n="login.create">Create a character</a>
        <button class="draft-view-toggle" id="draft-view-toggle" type="button" aria-pressed="false"><span aria-hidden="true">✎</span><span id="draft-view-label" data-i18n="login.showDrafts">Drafts</span></button>
        <button class="paint-bucket" id="character-paint" type="button" aria-expanded="false" data-i18n-aria="login.paint" data-i18n-title="login.paint"><span aria-hidden="true">◩</span></button>
        <div class="character-palette" id="character-palette" hidden></div>
      </div>
    </section>

    <p class="trust-note" data-i18n="login.trust">No passwords. This only remembers the character on this device.</p>
  </main>
  <script type="module" src="login.js"></script>
</body>
</html>
