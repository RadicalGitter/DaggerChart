<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Character — The Settlement</title>
<link rel="stylesheet" href="/shared/ledger.css">
<link rel="stylesheet" href="/shared/lamplight.css">
<link rel="stylesheet" href="/shared/paper.css">
<style>
  :root { --sheet-primary: #8b7653; --sheet-secondary: #9fcdb7; }
  .wrap { width: 100%; max-width: 780px; margin: 0 auto; padding: 1.4rem 1rem 5.5rem; box-sizing: border-box; overflow-x: clip; }
  header { display: flex; gap: 1rem; align-items: center; margin-bottom: 1rem; }
  header .portrait { width: 84px; height: 84px; overflow: hidden; border: 3px solid var(--sheet-primary); box-shadow: 0 0 0 2px var(--sheet-secondary); font-size: 2rem; }
  header .portrait img { width: 100%; height: 100%; object-fit: cover; }
  header h1 { color: color-mix(in srgb, var(--sheet-primary) 48%, #f0e3c7); font-size: 1.5rem; margin-bottom: 0.1rem; }
  .sheet-nav {
    position: sticky; z-index: 20; top: 0; height: 48px; display: flex; align-items: stretch; gap: 2px;
    margin: 0 -1rem 1rem; padding: 0 1rem; overflow-x: auto; scrollbar-width: none;
    border-top: 1px solid #3b3327; border-bottom: 1px solid #3b3327; background: rgba(24,22,17,.96); backdrop-filter: blur(8px);
  }
  .sheet-nav::-webkit-scrollbar { display: none; }
  .sheet-nav a {
    min-width: max-content; display: grid; place-items: center; padding: 0 .72rem; color: #a99c81;
    border-bottom: 2px solid transparent; font-size: .72rem; text-decoration: none;
  }
  .sheet-nav a:hover, .sheet-nav a:focus-visible { color: #f0e3c7; outline: none; }
  .sheet-nav a[aria-current="true"] { color: #f4e8cd; border-color: var(--sheet-secondary); }
  .sheet-anchor { scroll-margin-top: 62px; }
  .traits-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 0.6rem; margin: 1rem 0; }
  .trait-tile { position: relative; min-width: 0; box-sizing: border-box; text-align: center; padding: 0.55rem 0.3rem 0.75rem; border-bottom: 2px solid color-mix(in srgb, var(--trait-accent) 60%, transparent); }
  .trait-sheet-symbol { width: 38px; height: 38px; display: grid; place-items: center; margin: 0 auto .2rem; color: var(--trait-accent); border: 1px solid currentColor; border-radius: 50%; }
  .trait-sheet-symbol .trait-glyph { width: 30px; height: 30px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .trait-tile .v { font-size: 1.5rem; font-weight: 600; }
  .vitals { display: grid; gap: 0.8rem; margin: 1rem 0; }
  .vital { display: flex; align-items: center; gap: 0.9rem; }
  .vital .smallcaps { min-width: 70px; }
  .defenses { display: flex; justify-content: space-around; text-align: center; margin: 1rem 0; }
  .defenses .value { font-size: 1.5rem; font-weight: 600; }
  .sheet-section { margin-top: 1.4rem; }
  .sheet-section > .smallcaps { display: block; text-align: center; margin-bottom: 0.6rem; font-size: 0.95rem; }
  .featline { font-size: 0.9rem; margin: 0.45rem 0; }
  .featline strong { color: #d4b86a; }
  table.ledger td, table.ledger th { border-bottom-color: #3a2f1e; font-size: 0.9rem; }
  table.ledger th { color: #a89877; }
  .qa { margin-bottom: 0.8rem; }
  .qa .q { color: #a89877; font-size: 0.88rem; }
  ul { padding-left: 1.2rem; margin: 0.3rem 0; }
  li { font-size: 0.92rem; }
  .inventory-list { display: grid; gap: 0.45rem; margin: 0; padding: 0; list-style: none; }
  .inventory-paper { display: block; width: 100%; padding: 0.55rem 0.65rem; color: inherit; border: 1px solid #4d422f; border-radius: 4px; background: rgba(212,184,106,0.05); text-align: left; font: inherit; cursor: pointer; }
  .inventory-paper span { display: block; margin-top: 0.2rem; color: #a89877; font-size: 0.8rem; }
  .inventory-tools { margin-top: 0.65rem; text-align: right; }
  .paper-dialog { position: fixed; inset: 0; z-index: 40; display: grid; place-items: center; padding: 1rem; background: rgba(8,6,4,.86); backdrop-filter: blur(4px); }
  .paper-dialog[hidden] { display: none; }
  .paper-dialog-frame { position: relative; width: min(790px, 100%); max-height: calc(100vh - 2rem); overflow: auto; }
  .paper-dialog-close { position: fixed; z-index: 3; top: 1.2rem; right: 1.2rem; width: 40px; height: 40px; padding: 0; border-radius: 50%; color: #ead8a9; border: 1px solid rgba(234,216,169,.52); background: rgba(42,24,12,.88); font-size: 1.4rem; }
  .paper-dialog-actions { position: absolute; z-index: 5; right: 3rem; bottom: 3rem; display: flex; gap: .5rem; }
  .paper-editor { padding: 1.2rem; color: #392617; border: 1px solid #9a7848; background: linear-gradient(145deg, #eadab2, #cdb47f); }
  .paper-editor label { display: grid; gap: .3rem; margin: .7rem 0; color: #6f5130; }
  .paper-editor input, .paper-editor textarea { box-sizing: border-box; width: 100%; padding: .55rem; color: #392617; border: 1px solid #9a7848; background: rgba(255,248,226,.62); font: inherit; }
  .cardstack { display: grid; gap: 0.7rem; }
  .hand-sub { font-variant: small-caps; letter-spacing: 0.06em; color: #a89877; margin: 0.9rem 0 0.5rem; }
  .hand-actions { margin-top: 0.6rem; display: flex; gap: 0.5rem; }
  .hand-actions button { font-size: 0.85rem; padding: 0.3rem 0.8rem; }
  button.quiet.grave { color: #c96a4f; border-color: #6b4438; }
  .theme-panel { overflow: hidden; border-color: #56462d; background: radial-gradient(circle at 50% 0, #252c2b, #181611 70%); }
  .theme-head { display: flex; align-items: center; justify-content: space-between; gap: 0.8rem; margin-bottom: 0.75rem; }
  .theme-head .smallcaps { color: #d4b86a; }
  .theme-bubbles { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.75rem; min-height: 112px; padding: 0.4rem 0; }
  .theme-bubble {
    width: 112px; height: 112px; flex: 0 0 112px; padding: 0.7rem; border-radius: 50%;
    border: 1px solid #8aaea0; color: #f2ead8; text-align: center;
    background:
      radial-gradient(circle at 28% 22%, rgba(255,255,255,0.72) 0 4%, rgba(255,255,255,0.12) 11%, transparent 24%),
      radial-gradient(circle at 68% 72%, rgba(115,168,150,0.24), transparent 58%),
      rgba(58,76,70,0.38);
    box-shadow: inset -9px -12px 20px rgba(100,154,136,0.15), 0 6px 18px rgba(0,0,0,0.24);
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    animation: theme-drift 8s ease-in-out infinite;
  }
  .theme-bubble:nth-child(2n) { border-color: #9d8296; animation-delay: -3s; }
  .theme-bubble strong { font-size: 0.82rem; line-height: 1.15; overflow-wrap: anywhere; }
  .theme-bubble span { margin-top: 0.35rem; color: #b5aa92; font-size: 0.65rem; text-transform: uppercase; }
  .theme-bubble.rendering { opacity: 0.65; border-style: dashed; }
  .theme-bubble.preview-pulse { animation: theme-preview 0.4s ease-out; }
  .theme-publish { margin-top: 0.6rem; display: flex; flex-wrap: wrap; justify-content: center; gap: 0.45rem; }
  .theme-publish button { max-width: 100%; font-size: 0.78rem; padding: 0.28rem 0.65rem; white-space: normal; overflow-wrap: anywhere; }
  .theme-settings { margin-top: 0.8rem; border-top: 1px solid #3a3224; padding-top: 0.7rem; }
  .theme-settings summary { cursor: pointer; color: #b6a683; font-size: 0.85rem; }
  .theme-form { display: grid; gap: 0.6rem; margin-top: 0.7rem; }
  .theme-form label span { display: block; margin-bottom: 0.2rem; color: #a89877; font-size: 0.78rem; }
  .theme-form input, .theme-form textarea, .theme-form select { width: 100%; }
  .theme-note { min-height: 1.1rem; color: #a89877; font-size: 0.82rem; }
  @keyframes theme-drift { 0%,100% { translate: 0 0; } 50% { translate: 0 -4px; } }
  @keyframes theme-preview { 0%, 100% { scale: 1; opacity: 1; } 48% { scale: 1.07; opacity: 0.84; filter: saturate(1.3) brightness(1.08); } }
  @media (max-width: 520px) {
    .wrap { padding-inline: .72rem; }
    .sheet-head { align-items: flex-start; }
    .sheet-head .portrait { width: 70px; height: 70px; flex: 0 0 70px; }
    .sheet-nav { margin-inline: -.72rem; padding-inline: .72rem; }
  }
  @media (prefers-reduced-motion: reduce) { .theme-bubble { animation: none; } .theme-bubble.preview-pulse { animation-duration: 0.01ms; } }
</style>
</head>
<body>
<div class="wrap" id="sheet"><p class="smallcaps" style="text-align:center;" data-i18n="sheet.loading">Loading your character…</p></div>
<div class="paper-dialog" id="paper-dialog" hidden>
  <div class="paper-dialog-frame" role="dialog" aria-modal="true" aria-labelledby="paper-dialog-title">
    <button class="paper-dialog-close" id="paper-dialog-close" type="button" aria-label="Close">×</button>
    <div id="paper-dialog-body"></div>
  </div>
</div>
<script type="module" src="/character/sheet.js"></script>
</body>
</html>
