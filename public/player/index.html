<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Player root — The Settlement</title>
<link rel="stylesheet" href="/shared/ledger.css">
<link rel="stylesheet" href="player.css">
</head>
<body>
  <div class="hub-shell">
    <header class="hub-head">
      <a class="settlement-mark" href="/login">
        <span class="smallcaps" data-i18n="player.hub.root">Player root</span>
        <strong id="settlement-name">The Settlement</strong>
      </a>
      <div class="identity-wrap">
        <button class="identity-button" id="identity-button" type="button" aria-expanded="false">
          <span class="identity-mark" id="identity-mark" aria-hidden="true">?</span>
          <span id="identity-name" data-i18n="player.hub.choosepc">Choose your character</span>
          <span class="identity-caret" aria-hidden="true">⌄</span>
        </button>
        <div class="identity-menu" id="identity-menu" hidden></div>
      </div>
    </header>

    <main>
      <div class="hub-title">
        <div class="smallcaps" id="season-label"></div>
        <h1 data-i18n="player.hub.chooseview">Choose a view</h1>
      </div>
      <div class="view-shelf" id="view-shelf" aria-live="polite"></div>
      <section class="identity-gate" id="identity-gate" hidden>
        <h2 data-i18n="player.hub.choosepc">Choose your character</h2>
        <div id="identity-list"></div>
        <a class="create-character" href="/create/?return=/player" data-i18n="login.create">Create a character</a>
      </section>
    </main>

    <footer class="hub-foot">
      <a href="/login" data-i18n="player.hub.changeseat">Change seat</a>
    </footer>
  </div>
  <script type="module" src="player.js"></script>
</body>
</html>
